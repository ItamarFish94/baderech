<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תעודת אימות ״אני בדרך״ : ה״בדרךייטור״</title>
<meta name="theme-color" content="#0B0B0D">
<link rel="icon" href="icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
<symbol id="seal" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="47" fill="none" stroke="currentColor" stroke-width="3"/>
<circle cx="50" cy="50" r="36" fill="none" stroke="currentColor" stroke-width="1.5"/>
<path id="sealArc" d="M 50 50 m -41 0 a 41 41 0 1 1 82 0 a 41 41 0 1 1 -82 0" fill="none"/>
<text font-size="8.5" fill="currentColor" letter-spacing="1">
<textPath href="#sealArc">הרשות הלאומית לאימות · אני בדרך · בדרך</textPath>
</text>
<g transform="translate(50 50) scale(0.62) translate(-46 -50)">
<path fill="currentColor" fill-rule="evenodd" d="M48 13 C35.5 13 26 22.5 26 35 C26 44 30.5 50.5 37 56 L47.5 64.5 L56 80 L55 87 L70.5 85.5 L64 71 C61.5 63 61.5 58 62.5 53 C67.5 48.5 70 42.5 70 35 C70 22.5 60.5 13 48 13 Z M58 35 A10 10 0 1 1 38 35 A10 10 0 1 1 58 35 Z"/>
<path fill="currentColor" d="M42.5 56 L49 64.5 L41.5 76.5 L40.5 85.5 L23.5 86 Q21.5 86 21.5 83.5 L22 78.5 L36.5 72.8 Z"/>
</g>
</symbol>
</svg>

<main>
<div class="cert" id="cert">
<div class="serial" id="c-serial"></div>
<svg class="seal" style="color:#FAF5EB" aria-hidden="true"><use href="#seal"/></svg>
<h1>תעודת אימות ״אני בדרך״</h1>
<p class="authority-line">לא רוצים להלשין, אבל...<br>הנבדק קיבל הטבה לדומינוס באיסוף מהסניף.<br>קחו את זה מכאן.</p>

<div class="field">
<div class="flabel">מועד הבדיקה</div>
<div class="fvalue mono" id="c-ts"></div>
</div>
<div class="field">
<div class="flabel">תזוזה שנמדדה</div>
<div class="fvalue mono" id="c-meters"></div>
</div>
<div class="field">
<div class="flabel">סטטוס</div>
<div class="fvalue" id="c-status"></div>
</div>

<div class="stamp" id="c-stamp"><svg class="seal" aria-hidden="true"><use href="#seal"/></svg><span id="c-stamp-text"></span></div>

<p class="fine">הופק על ידי ה״בדרךייטור״</p>
</div>
</main>

<script>
(function () {
  "use strict";
  function fromB64url(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return decodeURIComponent(escape(atob(s)));
  }
  var params = new URLSearchParams(location.search);
  var raw = params.get("c");
  var data = null;
  try { data = JSON.parse(fromB64url(raw)); } catch (e) { data = null; }
  if (!data || data.s !== "verified") {
    document.getElementById("c-status").textContent = "תקנה 9(ג): אין תעודה, אין אימות.";
    document.getElementById("c-stamp").style.display = "none";
    return;
  }
  document.getElementById("c-serial").textContent = data.n || "";
  var d = new Date(data.ts);
  document.getElementById("c-ts").textContent = isNaN(d) ? "" :
    d.toLocaleDateString("he-IL") + " " + d.toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("c-meters").textContent = (data.m || 0) + " מטרים";
  var stamp = document.getElementById("c-stamp");
  stamp.classList.add("green");
  document.getElementById("c-stamp-text").textContent = "אומת";
  document.getElementById("c-status").textContent = "אומת. השולח באמת בדרך.";
})();
</script>
</body>
</html>
