<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תעודת אימות ״אני בדרך״ : ה״בדרךייטור״</title>
<meta name="theme-color" content="#0B0B0D">
<meta property="og:title" content="תעודת אימות ״אני בדרך״ : ה״בדרךייטור״">
<meta property="og:description" content="אם קיבלת את הקישור, כנראה שאין לך מילה.">
<meta property="og:image" content="https://itamarfish94.github.io/baderech/og.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<main>
<div class="cert" id="cert">
<div class="serial" id="c-serial"></div>
<img class="cert-logo" src="logo.png" alt="בדרךייטור">
<h1>תעודת אימות ״אני בדרך״</h1>
<p class="authority-line">לא רוצים להלשין, אבל...<br>הנבדק קיבל הטבה לדומינוס באיסוף מהסניף.<br>קחו את זה מכאן.</p>

<div class="field">
<div class="flabel">מועד הבדיקה</div>
<div class="fvalue mono" id="c-ts"></div>
</div>
<div class="field">
<div class="flabel">סטטוס</div>
<div class="fvalue" id="c-status"></div>
</div>

<div class="stamp" id="c-stamp"><span id="c-stamp-text"></span></div>

<p class="fine">הופק על ידי ה״בדרךייטור״</p>
</div>
</main>

<script>
(function () {
  "use strict";
  function fromB64url(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    return decodeURIComponent(escape(atob(s)));
  }
  var params = new URLSearchParams(location.search);
  var raw = params.get("c");
  var data = null;
  try { data = JSON.parse(fromB64url(raw)); } catch (e) { data = null; }
  if (!data || data.s !== "verified") {
    document.getElementById("c-status").textContent = "תקנה 9(ג): אין תעודה, אין אימות.";
    document.getElementById("c-stamp").style.display = "none";
    return;
  }
  document.getElementById("c-serial").textContent = data.n || "";
  var d = new Date(data.ts);
  document.getElementById("c-ts").textContent = isNaN(d) ? "" :
    d.toLocaleDateString("he-IL") + " " + d.toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
  var stamp = document.getElementById("c-stamp");
  stamp.classList.add("green");
  document.getElementById("c-stamp-text").textContent = "אומת";
  document.getElementById("c-status").textContent = "אומת. השולח באמת בדרך.";
})();
</script>
</body>
</html>
